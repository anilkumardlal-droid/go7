<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inquiry - Go7.in</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#ffffff;color:#0d0d0d;}

.container{
max-width:980px;
margin:40px auto;
background:#ffffff;
padding:30px;
border-radius:12px;
}

h2{
text-align:center;
margin-bottom:30px;
background:linear-gradient(90deg,#a855f7,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.field{display:flex;flex-direction:column;}
label{font-size:13px;margin-bottom:6px;}

label span{
color:#ff4d4f;
}

input,select,textarea{
padding:12px;
border:1px solid #d8dae0;
border-radius:8px;
font-size:14px;
background:#F9F9F9;
}

textarea{height:120px;}
.full{grid-column:span 2;}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#6366f1,#7c3aed);
color:#fff;
cursor:pointer;
}

.note{font-size:12px;color:#888;margin-top:4px;}

.success{
display:none;
text-align:center;
padding:40px;
}

.timer{
font-size:22px;
color:#ff4d4f;
margin-top:10px;
}

/* phone input fix */
.iti{width:100%;}
.iti input{
width:100%!important;
padding-left:50px!important;
}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
.full{grid-column:span 1;}
}
</style>
</head>

<body>

<div class="container">
<h2>Send your inquiry regarding this domain</h2>

<form id="form" onsubmit="sendMail(event)">
<div class="grid">

<div class="field">
<label>First Name <span>*</span></label>
<input id="fname" required>
</div>

<div class="field">
<label>Last Name <span>*</span></label>
<input id="lname" required>
</div>

<div class="field">
<label>Email Address <span>*</span></label>
<input type="email" id="email" required>
</div>

<div class="field">
<label>Telephone Number <span>*</span></label>
<input id="phone" type="tel" required>
</div>

<div class="field">
<label>Offer <span>*</span></label>
<input type="number" id="offer" min="50" required>
<span class="note">Minimum: $50.00</span>
</div>

<div class="field">
<label>Currency <span>*</span></label>
<select id="currency" required>
<option value="" disabled selected>Select</option>
<option value="USD">USD</option>
<option value="INR">INR</option>
</select>
</div>

<div class="field">
<label>Domain</label>
<input value="Go7.in" readonly>
</div>

<div class="field full">
<label>Message <span>*</span></label>
<textarea id="message" required></textarea>
</div>

<div class="cf-turnstile full" data-sitekey="0x4AAAAAACv6bw4Unpy1xqim"></div>

</div>

<button type="submit" id="submitBtn">Send Inquiry</button>
</form>

<div class="success" id="successBox">
<h2>Thank you! 🎉</h2>
<p>Your inquiry has been sent successfully.</p>
<div class="timer" id="timer">5</div>
</div>

</div>

<script>
(function(){
  emailjs.init("RA7Yehviqu_UNulcU");
})();

function sendMail(e){
  e.preventDefault();

  const submitBtn = document.getElementById("submitBtn");
  const tokenInput = document.querySelector('[name="cf-turnstile-response"]');

  if(!tokenInput || !tokenInput.value){
    alert("Verify you are human");
    return;
  }

  if(!iti.isValidNumber()){
    alert("Enter valid phone number");
    return;
  }

  const offerValue = parseFloat(document.getElementById("offer").value);
  if (offerValue < 50) {
    alert("Minimum offer is $50");
    return;
  }

  const params = {
    fname: fname.value,
    lname: lname.value,
    email: email.value,
    phone: iti.getNumber(),
    offer: offer.value,
    currency: currency.value,
    message: message.value,
    domain: "Go7.in"
  };

  submitBtn.disabled = true;
  submitBtn.textContent = "Sending...";

  emailjs.send("service_y231ani","template_fin8z5k",params)
  .then(()=>{
    form.style.display="none";
    successBox.style.display="block";

    let t=5;
    const timer=setInterval(()=>{
      document.getElementById("timer").innerText=--t;
      if(t<=0){
        clearInterval(timer);
        window.location="/";
      }
    },1000);
  })
  .catch(()=>{
    alert("Failed to send");
    submitBtn.disabled=false;
    submitBtn.textContent="Send Inquiry";
  });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

<script>
const iti = window.intlTelInput(document.querySelector("#phone"), {
  initialCountry:"IN",
  utilsScript:"https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
});
</script>

</body>
</html>
